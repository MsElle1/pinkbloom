<!DOCTYPE html>
<html>
<head>

    <title>PinkBloom Flower Shop</title>

    <style>

        body{
            font-family:Arial;
            background:#ffe4f0;
            padding:40px;
        }

        h1{
            text-align:center;
            color:#ff2e91;
        }

        .container{
            display:flex;
            gap:20px;
            justify-content:center;
            margin-top:40px;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:15px;
            width:200px;
            text-align:center;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        .price{
            color:#ff2e91;
            font-weight:bold;
        }

    </style>

</head>

<body>

<h1>🌸 PinkBloom Flower Shop</h1>

<div class="container">

    <div class="card">
        <h3>🌹 Rose</h3>
        <p class="price">$5</p>
    </div>

    <div class="card">
        <h3>🌷 Tulip</h3>
        <p class="price">$4</p>
    </div>

    <div class="card">
        <h3>🌻 Sunflower</h3>
        <p class="price">$6</p>
    </div>

</div>

</body>
</html>
